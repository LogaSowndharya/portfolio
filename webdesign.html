<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Loga Sowndharya | Web Design Projects</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <!-- Styling -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #f4f7fc;
            color: #333;
            line-height: 1.6;
        }

        header {
            background: #4f46e5;
            color: #fff;
            padding: 2rem;
            text-align: center;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
        }

        header h1 {
            font-size: 2.5rem;
        }

        header p {
            margin-top: 0.5rem;
            font-size: 1.1rem;
        }

        .container {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 2rem;
        }

        .project-section h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #4f46e5;
            border-bottom: 2px solid #ddd;
            padding-bottom: 0.5rem;
        }

        .projects {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        .project {
            background: #fff;
            padding: 1.5rem;
            border-radius: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }

        .project:hover {
            transform: translateY(-5px);
        }

        .project h3 {
            color: #333;
            margin-bottom: 1rem;
        }

        iframe {
            width: 100%;
            height: 400px;
            border: none;
            border-radius: 10px;
            background: #f9f9f9;
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: #888;
            font-size: 0.9rem;
        }

        @media (min-width: 768px) {
            .projects {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Loga Sowndharya</h1>
        <p>Final year Bioinformatics student | Passionate Full Stack Developer</p>
    </header>

    <main class="container">
        <section class="project-section">
            <h2>Web Design Projects</h2>
            <div class="projects">

                <div class="project">
                    <h3>Color Flip</h3>
                    <iframe src="https://logasowndharya.github.io/colorflip/"></iframe>
                </div>

                <div class="project">
                    <h3>Quote Generator</h3>
                    <iframe src="https://logasowndharya.github.io/qoutegenerate/"></iframe>
                </div>

            </div>
        </section>
    </main>

    <footer>
        © 2025 Loga Soundharya. All rights reserved.
    </footer>

</body>
</html>
